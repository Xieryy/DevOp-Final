name: CI/CD – Build, Test & Deploy

# ── Trigger: run on every push to any branch ──────────────────────────────────
on:
  push:
    branches: [ "**" ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# ── Shared env ────────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '21'
  JAR_NAME: idcard-0.0.1-SNAPSHOT.jar

jobs:
# ════════════════════════════════════════════════════════════════════════════════
# JOB 1 – Build & Test
# ════════════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    # Expose the committer's email to the notify job
    outputs:
      author_email: ${{ steps.get-author.outputs.email }}
      author_name:  ${{ steps.get-author.outputs.name }}

    steps:
      # 1. Checkout full history so git log can find the author
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Capture commit author details
      - name: Get commit author info
        id: get-author
        run: |
          echo "email=$(git log --format='%ae' -1 HEAD)" >> "$GITHUB_OUTPUT"
          echo "name=$(git log --format='%an' -1 HEAD)"  >> "$GITHUB_OUTPUT"

      # 3. Set up JDK
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # 4. Make Maven wrapper executable (Linux)
      - name: Make mvnw executable
        run: chmod +x mvnw

      # 5. Build & run tests — output saved to build-output.txt
      - name: Build and test with Maven
        run: ./mvnw clean package 2>&1 | tee build-output.txt

      # 6. Archive the JAR and build log regardless of outcome
      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          retention-days: 30
          path: |
            target/${{ env.JAR_NAME }}
            build-output.txt

      # 7. Publish JUnit test results
      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          retention-days: 30
          path: target/surefire-reports/

# ════════════════════════════════════════════════════════════════════════════════
# JOB 2 – Send failure email (only when build-and-test fails)
# ════════════════════════════════════════════════════════════════════════════════
  notify-failure:
    name: 📧 Notify on Failure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()

    steps:
      - name: Send failure email to fixed recipient + committer
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ BUILD FAILED: ${{ github.repository }} [Run #${{ github.run_number }}]"
          # Always CC srengty@gmail.com; also email the developer who broke the build
          to: srengty@gmail.com,${{ needs.build-and-test.outputs.author_email }}
          from: "GitHub Actions CI <${{ secrets.SMTP_USERNAME }}>"
          body: |
            ╔══════════════════════════════════════════╗
            ║        GitHub Actions — BUILD FAILED      ║
            ╚══════════════════════════════════════════╝

            Repository  : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit SHA  : ${{ github.sha }}
            Committed by: ${{ needs.build-and-test.outputs.author_name }} <${{ needs.build-and-test.outputs.author_email }}>
            Run Number  : ${{ github.run_number }}

            ▶ Console Log:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please review the logs and fix the issue as soon as possible.

            ─────────────────────────────────────────
            GitHub Actions CI/CD — ITC DevOps Project

# ════════════════════════════════════════════════════════════════════════════════
# JOB 3 – Deploy via Ansible (only when build-and-test succeeds)
# ════════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    steps:
      # 1. Checkout so we have hosts.ini and playbook.yml
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Ansible + SSH tools
      - name: Install Ansible & sshpass
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible sshpass openssh-client

      # 3. (Optional) Override hosts.ini with secret IP if webserver is dynamic
      #    If your hosts.ini is already correct, remove this step.
      - name: Inject webserver host from secrets (optional)
        if: ${{ secrets.WEBSERVER_HOST != '' }}
        run: |
          cat > hosts.ini <<EOF
          [webserver]
          ${{ secrets.WEBSERVER_HOST }} ansible_port=${{ secrets.WEBSERVER_PORT || '2222' }} ansible_user=root ansible_ssh_pass=${{ secrets.WEBSERVER_SSH_PASS }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      # 4. Run the playbook
      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i hosts.ini playbook.yml
